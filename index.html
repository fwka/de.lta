<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Executor | Premium Live Preview</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: #0d0d11;
            --neon-purple: #8a2be2;
            --neon-blue: #00ffff;
            --text-main: #ffffff;
            --text-dim: #707075;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #161129 0%, var(--bg-dark) 70%);
        }

        .main-card {
            width: 100%;
            max-width: 440px;
            padding: 40px 30px;
            background: var(--panel-bg);
            border-radius: 24px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .main-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--neon-purple), transparent, var(--neon-blue), transparent);
            animation: rotateGlow 6s linear infinite;
            z-index: 1;
            opacity: 0.3;
        }

        .card-content {
            position: relative;
            z-index: 2;
            background: var(--panel-bg);
            border-radius: 20px;
            margin: -36px -26px;
            padding: 36px 26px;
        }

        @keyframes rotateGlow {
            100% { transform: rotate(360deg); }
        }

        .logo-title {
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 30%, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-title span {
            color: var(--neon-purple);
            -webkit-text-fill-color: initial;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 35px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            margin-bottom: 18px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }

        .btn-ios {
            background: linear-gradient(135deg, #221b35, #120c1f);
            border: 1px solid rgba(138, 43, 226, 0.4);
        }

        .btn-ios:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.5);
        }

        .btn-android {
            background: linear-gradient(135deg, #091a24, #050d14);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .btn-android:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
        }

        footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="card-content">
            <h1 class="logo-title">DELTA <span>EXECUTOR</span></h1>
            <p class="subtitle">Premium Instant Installation</p>

            <!-- استدعاء دالة التثبيت المستضافة على حسابك مباشرة -->
            <a href="javascript:void(0);" onclick="directInstallScript();" class="btn btn-ios">
                Direct Install (iOS) 🍏
            </a>

            <a href="https://gloopup.net/Delta/android/" class="btn btn-android">
                Install APK (Android) 🤖
            </a>

            <footer>
                100% Ad-Block & Secure Direct Connection.
            </footer>
        </div>
    </div>

    <script>
        function directInstallScript() {
            // استدعاء ملف المانيفست الخاص بك والمحمي من تحويلات وإعلانات سيرفر دلتا
            window.location.href = 'itms-services://?action=download-manifest&url=https://hwishzi67.github.io/Htmlsjsjsj/manifest.plist';
        }
    </script>

</body>
</html>
